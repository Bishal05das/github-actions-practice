name: value pass workflow

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'enter your name'
        required: true
        default: 'unnamed'

jobs:
  get-value:
    runs-on: ubuntu-latest
    outputs:
      greetings_message: ${{steps.generate-message.outputs.message}}

    steps:
     - name: generate-messsage
       id: generate-message
       run: |
        echo "message=hello ${{github.event.inputs.name}}!" >> $GITHUB_OUTPUT

  print-value:
    runs-on: ubuntu-latest
    needs: [get-value]
    steps:
     - name: print greeting message
       run: |
        echo "${{needs.get-value.outputs.greetings_message}}"
