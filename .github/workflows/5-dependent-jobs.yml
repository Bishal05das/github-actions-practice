name: dependent multi jobs workflow

on:
  workflow-dispatch:

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
     - name: First Step
       run: |
        echo "First step"

  second-job:
    runs-on: ubuntu-latest
    needs: [first-job]

    steps:
     - name: first Step
       run: |
        echo "first step"

  third-job:
    runs-on: ubuntu-latest
    needs: [first-job,second-job]

    steps:
     - name: first Step
       run: |
        echo "first step"